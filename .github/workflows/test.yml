name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
      - name: Lint (blocking - critical errors)
        run: |
          ruff check scripts/ tests/ --select E9,F63,F7,F82 --ignore E402
      - name: Lint (non-blocking - style warnings)
        run: |
          ruff check scripts/ tests/ --select E,F,W --ignore E501,E402,F841 --exit-zero
      - name: Run tests
        run: |
          PYTHONPATH=.:scripts python -m pytest tests/ -v
