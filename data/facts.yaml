# ベッドコントロールアプリ — エビデンスファクト集
# 対象画面: 多職種退院調整・連休対策カンファ画面の下部 1 行ローテーション表示
# 出典マスター: docs/admin/bed_control_conference_facts_master.md
#
# layer 番号とレイヤー名:
#   1 = 退院時機能の最適化
#   2 = 退院タイミング判断
#   3 = リハビリの時間・強度・継続
#   4 = 多職種カンファ・連携の力
#   5 = 退院支援看護師の専門性
#   6 = 安全・既成概念の解除
#   7 = 病棟運営・社会的文脈
#
# context フィールド:
#   wards:    [5F, 6F]   対象病棟
#   modes:    [normal, holiday]  表示するモード (normal=通常ハドル, holiday=連休対策)
#   audience: [all, rehab, discharge_ns, doctor, nurse]  主な対象読者
#   weight:   1-10  ローテーション重み (10 が最重要)
#
# rotation_eligible フィールド (2026-04-18 副院長指示で追加):
#   true  = 下部バーのローテーション表示対象（入院延長×リハ介入×高齢者予後改善を示す強エビデンス）
#   false = 折りたたみ閲覧のみ（勉強目的、ローテーション表示対象外）
#   副院長の医療倫理的配慮:
#     「退院調整が医学的エビデンスに反する印象を避けるため、
#      ローテーションには入院延長がリハ介入を通じて予後を改善する
#      エビデンスレベル強のものだけを表示する」
#   rotation_eligible: true の件数は 12 件に限定。

