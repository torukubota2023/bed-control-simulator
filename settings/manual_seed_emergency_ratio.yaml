# 救急搬送後患者割合 — 手動シード値（rolling 3 ヶ月計算の暫定入力）
#
# 目的:
#   2026-04 から開始する「入院経路 5 区分 + 手術有無」の詳細データが
#   rolling 3 ヶ月判定（制度: 2026-06-01 本則適用）に必要な 3 ヶ月分
#   蓄積するまでのブリッジとして、副院長が電子カルテ・レセプト画面から
#   手集計した値を記録するファイル。
#
# 使用ルール:
#   - emergency_ratio.calculate_rolling_emergency_ratio() は、該当月の
#     detailed_v1 実データが無い（または不足）場合のみ、ここの seed 値を
#     採用して rolling 3 ヶ月を計算する。
#   - 計算方式は "mean_of_ratios_with_seeds"（シードが 1 月でも使われたら、
#     3 ヶ月の月別比率の単純平均に切り替え）。
#   - 値は整数 or 小数の百分率（例: 22.5 は 22.5%）を直接入れる。
#   - 未入力の場合は null のままにする（その月はシード不使用扱い）。
#
# 監査:
#   - updated_at / updated_by はコミットを通じて保持する。
#   - 純実データ rolling に移行したら、このファイルの seed 値は使われなくなる
#     （2026-07 頃を想定）。その時点でこのファイルは履歴として残してよい。

updated_at: "2026-04-20"
updated_by: "副院長 久保田徹"
source: "電子カルテの入院一覧 + レセプトの救急医療管理加算算定件数"
note: >-
  事務データは 2 値分類（当日/予定）しかないため、制度上の「救急搬送後
  （救急車搬送 + 下り搬送）」を厳密に取るための手集計シード。
  2026-07 以降は実データで rolling 3 ヶ月が完結するため、これらの値は
  使われなくなる（ファイルは履歴として残す）。

# シード値（未入力時は null）
# year_month: YYYY-MM 形式
# ward: "5F" / "6F"
# emergency_pct: 救急搬送後患者割合 (%)、null = 未入力
seeds:
  "2026-02":
    "5F":
      emergency_pct: null
      memo: ""
    "6F":
      emergency_pct: null
      memo: ""
  "2026-03":
    "5F":
      emergency_pct: null
      memo: ""
    "6F":
      emergency_pct: null
      memo: ""
